name: Build and Check

on:
  push:
    branches: [ main ] # Adjust branches as needed
  pull_request:
    branches: [ main ] # Adjust branches as needed

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  check:
    strategy:
      matrix:
        node: [ 22, 23 ]
    runs-on: ubuntu-latest
    name: Astro Check for Node.js ${{ matrix.node }}
    steps:
      - name: Setup Node.js
        uses: actions/setup-node@cdca7365b2dadb8aad0a33bc7601856ffabcc48e # v4.3.0
        with:
          node-version: ${{ matrix.node }} # Use LTS

      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup pnpm
        uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v4.1.0
        with:
          run_install: false # Disable auto-install

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Astro Check
        run: pnpm astro check

  build:
    strategy:
      matrix:
        node: [ 22, 23 ]
    runs-on: ubuntu-latest
    name: Astro Build for Node.js ${{ matrix.node }} # Corrected job name
    steps:
      - name: Setup Node.js
        uses: actions/setup-node@cdca7365b2dadb8aad0a33bc7601856ffabcc48e # v4.3.0
        with:
          node-version: ${{ matrix.node }}

      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup pnpm
        uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v4.1.0
        with:
          run_install: false # Disable auto-install

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Astro Build
        run: pnpm build

      - name: Prepare release bundle
        if: github.event_name == 'push' && github.ref_name == 'main' && matrix.node == 22
        run: |
          RELEASE_ARCHIVE="${RUNNER_TEMP}/release-bundle.tar.gz"

          cat > REVISION <<EOF
          git_sha=${GITHUB_SHA}
          git_branch=${GITHUB_REF_NAME}
          built_at=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          source=github-actions-build
          workflow_run=https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          EOF

          tar \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='.astro' \
            --exclude='.env.production' \
            --exclude='.runtime' \
            --exclude='public/imported-assets' \
            --exclude='src/content/posts/imported' \
            -czf "${RELEASE_ARCHIVE}" .

          echo "RELEASE_ARCHIVE=${RELEASE_ARCHIVE}" >> "${GITHUB_ENV}"

      - name: Upload release bundle artifact
        if: github.event_name == 'push' && github.ref_name == 'main' && matrix.node == 22
        uses: actions/upload-artifact@v4
        with:
          name: release-bundle-node22
          path: ${{ env.RELEASE_ARCHIVE }}
          if-no-files-found: error
          compression-level: 0
          retention-days: 7
