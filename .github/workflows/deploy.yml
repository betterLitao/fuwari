name: Deploy to Server

on:
  workflow_dispatch:
  workflow_run:
    workflows: [ "Build and Check" ]
    types: [ completed ]

concurrency:
  group: deploy-${{ github.event.workflow_run.head_sha || github.sha }}
  cancel-in-progress: true

permissions:
  contents: read
  actions: read

jobs:
  deploy:
    if: >
      github.event_name == 'workflow_dispatch' ||
      (
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.event == 'push' &&
        contains(fromJson('["main","feat/siyuan-import-admin"]'), github.event.workflow_run.head_branch)
      )
    runs-on: ubuntu-latest
    env:
      TARGET_BRANCH: ${{ github.event.workflow_run.head_branch || github.ref_name }}
      TARGET_REF: ${{ github.event.workflow_run.head_sha || github.sha }}
    steps:
      - name: Wait for code quality workflow
        if: github.event_name == 'workflow_run'
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const headSha = context.payload.workflow_run.head_sha;
            const headBranch = context.payload.workflow_run.head_branch;
            const workflowId = "biome.yml";
            const maxAttempts = 20;
            const delayMs = 15000;

            const delay = (ms) => new Promise((resolve) => setTimeout(resolve, ms));

            for (let attempt = 1; attempt <= maxAttempts; attempt += 1) {
              const { data } = await github.rest.actions.listWorkflowRuns({
                owner,
                repo,
                workflow_id: workflowId,
                branch: headBranch,
                event: "push",
                per_page: 20,
              });

              const run = data.workflow_runs.find((item) => item.head_sha === headSha);

              if (!run) {
                core.info(`Attempt ${attempt}/${maxAttempts}: Code quality run not found for ${headSha} yet.`);
              } else if (run.status !== "completed") {
                core.info(
                  `Attempt ${attempt}/${maxAttempts}: Code quality run ${run.id} is ${run.status}. Waiting...`,
                );
              } else if (run.conclusion === "success") {
                core.info(`Code quality run ${run.id} succeeded for ${headSha}.`);
                return;
              } else {
                core.setFailed(
                  `Code quality run ${run.id} finished with conclusion: ${run.conclusion}.`,
                );
                return;
              }

              await delay(delayMs);
            }

            core.setFailed("Timed out waiting for Code quality workflow to succeed.");

      - name: Show deploy target
        run: |
          echo "Deploy branch: ${TARGET_BRANCH}"
          echo "Deploy ref: ${TARGET_REF}"

      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ env.TARGET_REF }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run check
        run: pnpm check

      - name: Setup SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_KEY }}

      - name: Sync project files
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p "${DEPLOY_PORT}" "${DEPLOY_HOST}" >> ~/.ssh/known_hosts
          rsync -az --delete \
            --exclude ".git/" \
            --exclude ".github/" \
            --exclude ".astro/" \
            --exclude "dist/" \
            --exclude "node_modules/" \
            --exclude ".runtime/" \
            --exclude ".env.production" \
            --exclude "src/content/posts/imported/" \
            -e "ssh -p ${DEPLOY_PORT}" \
            ./ "${DEPLOY_USER}@${DEPLOY_HOST}:${DEPLOY_PATH}/"

      - name: Write production env and deploy
        env:
          DEPLOY_ENV_FILE: ${{ secrets.DEPLOY_ENV_FILE }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
        run: |
          ssh -p "${DEPLOY_PORT}" "${DEPLOY_USER}@${DEPLOY_HOST}" "mkdir -p '${DEPLOY_PATH}'"
          printf '%s\n' "${DEPLOY_ENV_FILE}" | ssh -p "${DEPLOY_PORT}" "${DEPLOY_USER}@${DEPLOY_HOST}" "cat > '${DEPLOY_PATH}/.env.production'"
          ssh -p "${DEPLOY_PORT}" "${DEPLOY_USER}@${DEPLOY_HOST}" "cd '${DEPLOY_PATH}' && bash ops/deploy-server.sh"
