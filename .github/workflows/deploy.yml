name: Deploy to Server

on:
  workflow_run:
    workflows: ["Code quality"]
    types: [completed]

concurrency:
  group: deploy-${{ github.event.workflow_run.head_sha || github.sha }}
  cancel-in-progress: true

permissions:
  contents: read
  actions: read

jobs:
  deploy:
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.head_branch == 'main'
    runs-on: ubuntu-latest
    env:
      TARGET_BRANCH: ${{ github.event.workflow_run.head_branch }}
      TARGET_REF: ${{ github.event.workflow_run.head_sha }}
    steps:
      - name: Wait for build and check workflow
        id: resolve_build_run
        if: github.event_name == 'workflow_run'
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const headSha = context.payload.workflow_run.head_sha;
            const headBranch = context.payload.workflow_run.head_branch;
            const workflowId = "build.yml";
            const maxAttempts = 20;
            const delayMs = 15000;

            const delay = (ms) => new Promise((resolve) => setTimeout(resolve, ms));

            for (let attempt = 1; attempt <= maxAttempts; attempt += 1) {
              const { data } = await github.rest.actions.listWorkflowRuns({
                owner,
                repo,
                workflow_id: workflowId,
                branch: headBranch,
                event: "push",
                per_page: 20,
              });

              const run = data.workflow_runs.find((item) => item.head_sha === headSha);

              if (!run) {
                core.info(`Attempt ${attempt}/${maxAttempts}: Build and Check run not found for ${headSha} yet.`);
              } else if (run.status !== "completed") {
                core.info(
                  `Attempt ${attempt}/${maxAttempts}: Build and Check run ${run.id} is ${run.status}. Waiting...`,
                );
              } else if (run.conclusion === "success") {
                core.info(`Build and Check run ${run.id} succeeded for ${headSha}.`);
                core.setOutput("build_run_id", String(run.id));
                return;
              } else {
                core.setFailed(
                  `Build and Check run ${run.id} finished with conclusion: ${run.conclusion}.`,
                );
                return;
              }

              await delay(delayMs);
            }

            core.setFailed("Timed out waiting for Build and Check workflow to succeed.");

      - name: Show deploy target
        run: |
          echo "Deploy branch: ${TARGET_BRANCH}"
          echo "Deploy ref: ${TARGET_REF}"

      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ env.TARGET_REF }}

      - name: Download release bundle artifact
        uses: actions/download-artifact@v4
        with:
          name: release-bundle-node22
          run-id: ${{ steps.resolve_build_run.outputs.build_run_id }}
          path: ${{ runner.temp }}/release-bundle
          github-token: ${{ github.token }}

      - name: Resolve release package
        run: |
          SHORT_SHA="${TARGET_REF::7}"
          RELEASE_ID="$(date -u +%Y%m%d-%H%M%S)-${SHORT_SHA}"
          ARCHIVE_PATH="${RUNNER_TEMP}/release-bundle/release-bundle.tar.gz"

          if [[ ! -f "${ARCHIVE_PATH}" ]]; then
            echo "缺少 release bundle artifact: ${ARCHIVE_PATH}"
            exit 1
          fi

          {
            echo "RELEASE_ID=${RELEASE_ID}"
            echo "ARCHIVE_PATH=${ARCHIVE_PATH}"
          } >> "${GITHUB_ENV}"

      - name: Setup SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_KEY }}

      - name: Prepare SSH known_hosts
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
        run: |
          set -euo pipefail

          mkdir -p ~/.ssh
          touch ~/.ssh/known_hosts
          chmod 700 ~/.ssh
          chmod 600 ~/.ssh/known_hosts

          for attempt in 1 2 3; do
            if ssh-keyscan -T 10 -p "${DEPLOY_PORT}" "${DEPLOY_HOST}" >> ~/.ssh/known_hosts; then
              sort -u ~/.ssh/known_hosts -o ~/.ssh/known_hosts
              exit 0
            fi

            echo "ssh-keyscan failed (attempt ${attempt}/3)" >&2

            if [[ "${attempt}" -eq 3 ]]; then
              exit 1
            fi

            sleep 5
          done

      - name: Ensure remote deploy directories
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
        run: |
          set -euo pipefail

          SSH_TARGET="${DEPLOY_USER}@${DEPLOY_HOST}"
          SSH_OPTS=(
            -o BatchMode=yes
            -o ConnectTimeout=10
            -o ServerAliveInterval=30
            -o ServerAliveCountMax=6
            -p "${DEPLOY_PORT}"
          )

          for attempt in 1 2 3; do
            if ssh "${SSH_OPTS[@]}" "${SSH_TARGET}" \
              "mkdir -p '${DEPLOY_PATH}/incoming' '${DEPLOY_PATH}/shared'"; then
              exit 0
            fi

            echo "Failed to create remote deploy directories (attempt ${attempt}/3)" >&2

            if [[ "${attempt}" -eq 3 ]]; then
              exit 1
            fi

            sleep 5
          done

      - name: Upload deploy env file
        env:
          DEPLOY_ENV_FILE: ${{ secrets.DEPLOY_ENV_FILE }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
        run: |
          set -euo pipefail

          SSH_TARGET="${DEPLOY_USER}@${DEPLOY_HOST}"
          SSH_OPTS=(
            -o BatchMode=yes
            -o ConnectTimeout=10
            -o ServerAliveInterval=30
            -o ServerAliveCountMax=6
            -p "${DEPLOY_PORT}"
          )

          for attempt in 1 2 3; do
            if printf '%s\n' "${DEPLOY_ENV_FILE}" | \
              ssh "${SSH_OPTS[@]}" "${SSH_TARGET}" \
                "cat > '${DEPLOY_PATH}/shared/.env.production'"; then
              exit 0
            fi

            echo "Failed to upload deploy env file (attempt ${attempt}/3)" >&2

            if [[ "${attempt}" -eq 3 ]]; then
              exit 1
            fi

            sleep 5
          done

      - name: Upload release bundle
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
        run: |
          set -euo pipefail

          SSH_TARGET="${DEPLOY_USER}@${DEPLOY_HOST}"
          REMOTE_ARCHIVE_PATH="${DEPLOY_PATH}/incoming/${RELEASE_ID}.tar.gz"
          SCP_OPTS=(
            -o BatchMode=yes
            -o ConnectTimeout=10
            -o ServerAliveInterval=30
            -o ServerAliveCountMax=6
            -P "${DEPLOY_PORT}"
          )

          for attempt in 1 2 3; do
            if scp "${SCP_OPTS[@]}" "${ARCHIVE_PATH}" "${SSH_TARGET}:${REMOTE_ARCHIVE_PATH}"; then
              exit 0
            fi

            echo "Failed to upload release bundle (attempt ${attempt}/3)" >&2

            if [[ "${attempt}" -eq 3 ]]; then
              exit 1
            fi

            sleep 5
          done

      - name: Activate release on server
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
        run: |
          set -euo pipefail

          ssh \
            -o BatchMode=yes \
            -o ConnectTimeout=10 \
            -o ServerAliveInterval=30 \
            -o ServerAliveCountMax=20 \
            -p "${DEPLOY_PORT}" \
            "${DEPLOY_USER}@${DEPLOY_HOST}" \
            "APP_DIR='${DEPLOY_PATH}' RELEASE_ID='${RELEASE_ID}' bash -s" < ops/deploy-server.sh
